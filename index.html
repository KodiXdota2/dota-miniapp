<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Drafter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
    }
    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }
    .selected-box {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #333;
    }
    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .mode-btn.active-enemy {
      background: #a94442;
      border-color: #ff4d4d;
    }
    .mode-btn.active-ally {
      background: #3c763d;
      border-color: #5cd65c;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .hero-card {
      background: #222;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      text-align: center;
      position: relative;
    }
    .hero-card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .hero-card .hero-name {
      font-size: 11px;
      padding: 4px 2px;
      background: rgba(0,0,0,0.8);
    }
    .hero-card.selected-enemy {
      border-color: #ff4d4d;
      box-shadow: 0 0 8px #ff4d4d;
    }
    .hero-card.selected-ally {
      border-color: #5cd65c;
      box-shadow: 0 0 8px #5cd65c;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #f0ad4e;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Dota 2 Drafter</h2>

  <div class="selected-box">
    <div><strong>Враги:</strong> <span id="enemies-list" style="color:#ff4d4d;">Никого</span></div>
    <div><strong>Союзники:</strong> <span id="allies-list" style="color:#5cd65c;">Никого</span></div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active-enemy" id="mode-enemy" onclick="setMode('enemy')">Выбирать ВРАГА</button>
    <button class="mode-btn" id="mode-ally" onclick="setMode('ally')">Выбирать СОЮЗНИКА</button>
  </div>

  <div class="hero-grid" id="heroes-container"></div>

  <button class="btn-submit" onclick="sendData()">Рассчитать идеальный пик</button>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Герои с их системными именами для аватарок Valve CDN
    const heroesList = [
      { name: "Axe", code: "axe" },
      { name: "Invoker", code: "invoker" },
      { name: "Sniper", code: "sniper" },
      { name: "Pudge", code: "pudge" },
      { name: "Juggernaut", code: "juggernaut" },
      { name: "Phantom Assassin", code: "phantom_assassination" },
      { name: "Slark", code: "slark" },
      { name: "Sven", code: "sven" },
      { name: "Anti-Mage", code: "antimage" },
      { name: "Faceless Void", code: "faceless_void" },
      { name: "Bristleback", code: "bristleback" },
      { name: "Drow Ranger", code: "drow_ranger" }
    ];

    let selectedEnemies = [];
    let selectedAllies = [];
    let currentMode = 'enemy';

    function setMode(mode) {
      currentMode = mode;
      const enemyBtn = document.getElementById('mode-enemy');
      const allyBtn = document.getElementById('mode-ally');

      if (mode === 'enemy') {
        enemyBtn.className = 'mode-btn active-enemy';
        allyBtn.className = 'mode-btn';
      } else {
        enemyBtn.className = 'mode-btn';
        allyBtn.className = 'mode-btn active-ally';
      }
    }

    function renderHeroes() {
      const container = document.getElementById('heroes-container');
      container.innerHTML = '';

      heroesList.forEach(hero => {
        const card = document.createElement('div');
        card.className = 'hero-card';

        if (selectedEnemies.includes(hero.name)) card.classList.add('selected-enemy');
        if (selectedAllies.includes(hero.name)) card.classList.add('selected-ally');

        // Ссылка на официальные картинки иконок Dota 2
        const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png`;

        card.innerHTML = `
          <img src="${imgUrl}" alt="${hero.name}" onerror="this.src='https://via.placeholder.com/100x60?text=${hero.name}'">
          <div class="hero-name">${hero.name}</div>
        `;

        card.onclick = () => toggleHero(hero.name);
        container.appendChild(card);
      });
    }

    function toggleHero(heroName) {
      if (currentMode === 'enemy') {
        if (selectedEnemies.includes(heroName)) {
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        } else if (selectedEnemies.length < 5) {
          selectedEnemies.push(heroName);
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        }
      } else {
        if (selectedAllies.includes(heroName)) {
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        } else if (selectedAllies.length < 4) {
          selectedAllies.push(heroName);
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        }
      }

      document.getElementById('enemies-list').innerText = selectedEnemies.join(', ') || 'Никого';
      document.getElementById('allies-list').innerText = selectedAllies.join(', ') || 'Никого';
      renderHeroes();
    }

    function sendData() {
      if (selectedEnemies.length === 0) {
        alert('Выбери хотя бы одного врага!');
        return;
      }
      let data = {
        allies: selectedAllies,
        enemies: selectedEnemies
      };
      tg.sendData(JSON.stringify(data));
      tg.close();
    }

    renderHeroes();
  </script>
</body>
</html>
