<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DotaMETA Pro</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
    body {
      background: #0d0a1a;
      background: radial-gradient(circle at top, #1e1338 0%, #0d0a1a 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      padding-bottom: 85px;
      min-height: 100vh;
    }
    .search-container { position: relative; margin-bottom: 15px; }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .search-input::placeholder { color: #8b85a1; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8b85a1; }
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #d0c8e8; }
    
    .heroes-list { display: flex; flex-direction: column; gap: 8px; }
    .hero-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px; padding: 8px 12px; cursor: pointer;
    }
    .hero-item:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.08); }
    .hero-left { display: flex; align-items: center; gap: 12px; }
    .hero-avatar { width: 50px; height: 30px; border-radius: 6px; object-fit: cover; }
    .hero-meta { display: flex; flex-direction: column; }
    .hero-title { font-size: 14px; font-weight: 700; }
    .hero-role { font-size: 10px; font-weight: 700; }
    .role-carry { color: #ffab00; }
    .role-support { color: #00e676; }
    .role-mid { color: #ff5252; }
    .role-offlane { color: #29b6f6; }
    .winrate-badge {
      background: rgba(0, 230, 118, 0.12); color: #00e676;
      border: 1px solid rgba(0, 230, 118, 0.3);
      padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 700;
    }

    .draft-view { display: none; }
    .mode-switch { display: flex; background: rgba(255, 255, 255, 0.05); padding: 4px; border-radius: 12px; margin-bottom: 12px; }
    .mode-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #8b85a1; font-weight: 700; font-size: 11px; border-radius: 8px; cursor: pointer; }
    .mode-btn.active-enemy { background: rgba(255, 82, 82, 0.2); color: #ff5252; border: 1px solid #ff5252; }
    .mode-btn.active-ally { background: rgba(0, 230, 118, 0.2); color: #00e676; border: 1px solid #00e676; }
    .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 280px; overflow-y: auto; }
    .grid-card { background: rgba(255, 255, 255, 0.05); border: 2px solid transparent; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; cursor: pointer; }
    .grid-card img { width: 100%; height: 100%; object-fit: cover; }
    .grid-card.sel-enemy { border-color: #ff5252; box-shadow: 0 0 6px rgba(255, 82, 82, 0.6); }
    .grid-card.sel-ally { border-color: #00e676; box-shadow: 0 0 6px rgba(0, 230, 118, 0.6); }

    .btn-calc-draft {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #e5a93c, #c88318);
      border: none; color: #0d0a1a; font-weight: 800; border-radius: 12px; font-size: 13px;
      text-transform: uppercase; margin-top: 12px; cursor: pointer;
    }
    .draft-results { margin-top: 12px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; display: none; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 3, 12, 0.9); backdrop-filter: blur(10px);
      display: none; justify-content: center; align-items: flex-end; z-index: 100;
    }
    .modal-content {
      width: 100%; max-height: 85vh; background: #17122b;
      border-top-left-radius: 20px; border-top-right-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; overflow-y: auto;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .close-btn { background: rgba(255, 255, 255, 0.1); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; }
    .info-block { background: rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    .info-title { font-size: 10px; color: #8b85a1; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
    .items-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .item-card { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 8px; min-width: 75px; text-align: center; }
    .item-card img { width: 40px; height: 28px; border-radius: 4px; margin-bottom: 4px; object-fit: cover; }
    .item-time { font-size: 9px; color: #ffab00; font-weight: 700; }

    .mini-heroes-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .mini-hero-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; text-align: center; }
    .mini-hero-item img { width: 44px; height: 26px; border-radius: 4px; object-fit: cover; margin-bottom: 3px; }
    .mini-hero-item span { font-size: 9px; font-weight: 600; color: #ccc; }

    .bottom-nav {
      position: fixed; bottom: 12px; left: 12px; right: 12px;
      background: rgba(23, 18, 43, 0.95); border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px; padding: 4px; display: flex; justify-content: space-around; backdrop-filter: blur(16px); z-index: 90;
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 0; background: transparent; border: none; color: #8b85a1; font-size: 10px; font-weight: 700; border-radius: 12px; cursor: pointer; }
    .nav-btn.active { background: rgba(255, 255, 255, 0.1); color: #fff; }
  </style>
</head>
<body>

  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Поиск героя..." oninput="filterHeroes()">
  </div>

  <div id="tab-heroes">
    <div class="section-title">👥 Мета Герои (Патч 7.35+)</div>
    <div class="heroes-list" id="heroes-list-container"></div>
  </div>

  <div id="tab-draft" class="draft-view">
    <div class="section-title">🪄 Помощник Драфта</div>
    <div class="mode-switch">
      <button class="mode-btn active-enemy" id="m-enemy" onclick="setDraftMode('enemy')">Выбрать ВРАГА</button>
      <button class="mode-btn" id="m-ally" onclick="setDraftMode('ally')">Выбрать СОЮЗНИКА</button>
    </div>
    <div class="grid-select" id="draft-grid"></div>
    <button class="btn-calc-draft" onclick="calculateDraft()">Рассчитать идеальный пик</button>

    <div class="draft-results" id="draft-results-box">
      <div class="info-title">⚔️ Лучшие контрпики:</div>
      <div id="draft-results-list" style="display:flex; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <div class="modal-overlay" id="hero-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:10px;">
          <img id="m-img" style="width:50px; height:30px; border-radius:6px; object-fit:cover;">
          <div>
            <h2 id="m-title" style="font-size:16px;">Hero</h2>
            <span id="m-role" class="hero-role">ROLE</span>
          </div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="info-block">
        <div class="info-title">📊 Винрейт в актуальной мете</div>
        <div id="m-winrate" style="font-size:18px; font-weight:800; color:#00e676;">50.0%</div>
      </div>

      <div class="info-block">
        <div class="info-title">🛍️ Актуальная сборка (High MM Meta)</div>
        <div class="items-list" id="m-items"></div>
      </div>

      <div class="info-block">
        <div class="info-title">🛡️ Синергия (Лучшие союзники)</div>
        <div class="mini-heroes-grid" id="m-allies"></div>
      </div>

      <div class="info-block">
        <div class="info-title">⚔️ Худшие враги (Контрпики)</div>
        <div class="mini-heroes-grid" id="m-counters"></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="btn-tab-heroes" onclick="switchTab('heroes')">
      <span style="font-size:15px;">👥</span>ГЕРОИ
    </button>
    <button class="nav-btn" id="btn-tab-draft" onclick="switchTab('draft')">
      <span style="font-size:15px;">🪄</span>ДРАФТ
    </button>
  </div>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const heroesData = [
      {
        name: "Snapfire", code: "snapfire", role: "MID / SUPPORT", roleClass: "role-mid", winrate: "53.2%", isCarry: false,
        items: [
          {name: "Arcane Boots", time: "5 мин", img: "arcane_boots"},
          {name: "Kaya and Sange", time: "14 мин", img: "kaya_and_sange"},
          {name: "Aghanims Shard", time: "15 мин", img: "aghanims_shard"},
          {name: "Shivas Guard", time: "22 мин", img: "shivas_guard"}
        ],
        alliesCodes: ["faceless_void", "mars", "axe", "tidehunter"],
        counterCodes: ["rubick", "silencer", "storm_spirit", "clockwerk"]
      },
      {
        name: "Wraith King", code: "skeleton_king", role: "CARRY", roleClass: "role-carry", winrate: "54.7%", isCarry: true,
        items: [
          {name: "Armlet", time: "11 мин", img: "armlet"},
          {name: "Desolator", time: "18 мин", img: "desolator"},
          {name: "BKB", time: "23 мин", img: "black_king_bar"}
        ],
        alliesCodes: ["invoker", "rubick", "dazzle", "lion"],
        counterCodes: ["antimage", "phantom_lancer", "slark", "razor"]
      },
      {
        name: "Spectre", code: "spectre", role: "CARRY", roleClass: "role-carry", winrate: "54.4%", isCarry: true,
        items: [
          {name: "Blade Mail", time: "10 мин", img: "blade_mail"},
          {name: "Radiance", time: "19 мин", img: "radiance"},
          {name: "Manta Style", time: "24 мин", img: "manta"}
        ],
        alliesCodes: ["zuus", "warlock", "silencer", "treant"],
        counterCodes: ["viper", "necrolyte", "antimage", "lifestealer"]
      },
      {
        name: "Invoker", code: "invoker", role: "MID LANE", roleClass: "role-mid", winrate: "52.0%", isCarry: false,
        items: [
          {name: "Urn of Shadows", time: "6 мин", img: "urn_of_shadows"},
          {name: "Witch Blade", time: "13 мин", img: "witch_blade"},
          {name: "Blink Dagger", time: "18 мин", img: "blink"}
        ],
        alliesCodes: ["faceless_void", "tidehunter", "axe", "mars"],
        counterCodes: ["viper", "silencer", "phantom_assassin", "nyx_assassin"]
      },
      {
        name: "Pudge", code: "pudge", role: "OFFLANE / SUPP", roleClass: "role-offlane", winrate: "51.8%", isCarry: false,
        items: [
          {name: "Phase Boots", time: "6 мин", img: "phase_boots"},
          {name: "Aghanims Scepter", time: "18 мин", img: "ultimate_scepter"},
          {name: "Blink Dagger", time: "22 мин", img: "blink"}
        ],
        alliesCodes: ["mirana", "clockwerk", "rubick", "invoker"],
        counterCodes: ["lifestealer", "weaver", "ursa", "timbersaw"]
      },
      {
        name: "Faceless Void", code: "faceless_void", role: "CARRY", roleClass: "role-carry", winrate: "51.5%", isCarry: true,
        items: [
          {name: "Maelstrom", time: "12 мин", img: "maelstrom"},
          {name: "Manta Style", time: "20 мин", img: "manta"},
          {name: "Mjollnir", time: "26 мин", img: "mjollnir"}
        ],
        alliesCodes: ["snapfire", "invoker", "skywrath_mage", "witch_doctor"],
        counterCodes: ["wraith_king", "omniknight", "pudge", "silencer"]
      },
      {
        name: "Drow Ranger", code: "drow_ranger", role: "CARRY", roleClass: "role-carry", winrate: "52.3%", isCarry: true,
        items: [
          {name: "Dragon Lance", time: "11 мин", img: "dragon_lance"},
          {name: "Yasha and Kaya", time: "18 мин", img: "yasha_and_kaya"},
          {name: "Hurricane Pike", time: "22 мин", img: "hurricane_pike"}
        ],
        alliesCodes: ["vengefulspirit", "clockwerk", "treant", "mars"],
        counterCodes: ["phantom_assassin", "slark", "spectre", "axe"]
      },
      {
        name: "Juggernaut", code: "juggernaut", role: "CARRY", roleClass: "role-carry", winrate: "52.8%", isCarry: true,
        items: [
          {name: "Maelstrom", time: "11 мин", img: "maelstrom"},
          {name: "Manta Style", time: "19 мин", img: "manta"},
          {name: "Butterfly", time: "26 мин", img: "butterfly"}
        ],
        alliesCodes: ["crystal_maiden", "shadow_shaman", "lion", "lich"],
        counterCodes: ["axe", "slardar", "ursa", "bane"]
      },
      {
        name: "Phantom Assassin", code: "phantom_assassin", role: "CARRY", roleClass: "role-carry", winrate: "51.9%", isCarry: true,
        items: [
          {name: "Battle Fury", time: "14 мин", img: "bfury"},
          {name: "Desolator", time: "20 мин", img: "desolator"},
          {name: "BKB", time: "24 мин", img: "black_king_bar"}
        ],
        alliesCodes: ["magnataur", "ogre_magi", "snapfire", "treant"],
        counterCodes: ["axe", "razor", "tinker", "morphling"]
      },
      {
        name: "Axe", code: "axe", role: "OFFLANE", roleClass: "role-offlane", winrate: "52.5%", isCarry: false,
        items: [
          {name: "Vanguard", time: "6 мин", img: "vanguard"},
          {name: "Blink Dagger", time: "11 мин", img: "blink"},
          {name: "Blade Mail", time: "15 мин", img: "blade_mail"}
        ],
        alliesCodes: ["invoker", "dazzle", "grimstroke", "skywrath_mage"],
        counterCodes: ["ursa", "venomancer", "viper", "timbersaw"]
      },
      {
        name: "Slark", code: "slark", role: "CARRY", roleClass: "role-carry", winrate: "52.1%", isCarry: true,
        items: [
          {name: "Diffusal Blade", time: "12 мин", img: "diffusal_blade"},
          {name: "Aghanims Scepter", time: "20 мин", img: "ultimate_scepter"},
          {name: "Manta Style", time: "25 мин", img: "manta"}
        ],
        alliesCodes: ["omniknight", "dark_seer", "lich", "abaddon"],
        counterCodes: ["bloodseeker", "leshrac", "disruptor", "axe"]
      },
      {
        name: "Anti-Mage", code: "antimage", role: "CARRY", roleClass: "role-carry", winrate: "50.8%", isCarry: true,
        items: [
          {name: "Battle Fury", time: "13 мин", img: "bfury"},
          {name: "Manta Style", time: "20 мин", img: "manta"},
          {name: "Abyssal Blade", time: "27 мин", img: "abyssal_blade"}
        ],
        alliesCodes: ["dazzle", "lion", "shadow_shaman", "crystal_maiden"],
        counterCodes: ["meepo", "disruptor", "legion_commander", "slardar"]
      },
      {
        name: "Vengeful Spirit", code: "vengefulspirit", role: "SUPPORT", roleClass: "role-support", winrate: "53.4%", isCarry: false,
        items: [
          {name: "Tranquil Boots", time: "6 мин", img: "tranquil_boots"},
          {name: "Solar Crest", time: "14 мин", img: "solar_crest"},
          {name: "Aghanims Scepter", time: "24 мин", img: "ultimate_scepter"}
        ],
        alliesCodes: ["drow_ranger", "luna", "sven", "slardar"],
        counterCodes: ["rubick", "tinker", "phantom_lancer", "meepo"]
      }
    ];

    let draftEnemies = [];
    let draftAllies = [];
    let draftMode = 'enemy';

    function getHeroNameByCode(code) {
      const hero = heroesData.find(h => h.code === code);
      return hero ? hero.name : code;
    }

    function renderHeroesList(list = heroesData) {
      const container = document.getElementById('heroes-list-container');
      container.innerHTML = '';
      list.forEach(h => {
        const item = document.createElement('div');
        item.className = 'hero-item';
        item.innerHTML = `
          <div class="hero-left">
            <img class="hero-avatar" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.code}.png">
            <div class="hero-meta">
              <span class="hero-title">${h.name}</span>
              <span class="hero-role ${h.roleClass}">➶ ${h.role}</span>
            </div>
          </div>
          <div class="winrate-badge">${h.winrate}</div>
        `;
        item.onclick = () => openModal(h);
        container.appendChild(item);
      });
    }

    function openModal(hero) {
      document.getElementById('m-title').innerText = hero.name;
      document.getElementById('m-role').innerText = hero.role;
      document.getElementById('m-role').className = `hero-role ${hero.roleClass}`;
      document.getElementById('m-winrate').innerText = hero.winrate;
      document.getElementById('m-img').src = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png`;

      const itemsContainer = document.getElementById('m-items');
      itemsContainer.innerHTML = '';
      hero.items.forEach(it => {
        itemsContainer.innerHTML += `
          <div class="item-card">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/${it.img}.png">
            <span style="font-size:9px; font-weight:bold; color:#fff;">${it.name}</span>
            <span class="item-time">⏱️ ${it.time}</span>
          </div>
        `;
      });

      const alliesContainer = document.getElementById('m-allies');
      alliesContainer.innerHTML = '';
      hero.alliesCodes.forEach(code => {
        alliesContainer.innerHTML += `
          <div class="mini-hero-item">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${code}.png">
            <span>${getHeroNameByCode(code)}</span>
          </div>
        `;
      });

      const countersContainer = document.getElementById('m-counters');
      countersContainer.innerHTML = '';
      hero.counterCodes.forEach(code => {
        countersContainer.innerHTML += `
          <div class="mini-hero-item">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${code}.png">
            <span>${getHeroNameByCode(code)}</span>
          </div>
        `;
      });

      document.getElementById('hero-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('hero-modal').style.display = 'none'; }
    function filterHeroes() {
      const q = document.getElementById('search-input').value.toLowerCase();
      renderHeroesList(heroesData.filter(h => h.name.toLowerCase().includes(q)));
    }

    function switchTab(tab) {
      document.getElementById('tab-heroes').style.display = tab === 'heroes' ? 'block' : 'none';
      document.getElementById('tab-draft').style.display = tab === 'draft' ? 'block' : 'none';
      document.getElementById('btn-tab-heroes').className = tab === 'heroes' ? 'nav-btn active' : 'nav-btn';
      document.getElementById('btn-tab-draft').className = tab === 'draft' ? 'nav-btn active' : 'nav-btn';
      if (tab === 'draft') renderDraftGrid();
    }

    function setDraftMode(m) {
      draftMode = m;
      document.getElementById('m-enemy').className = m === 'enemy' ? 'mode-btn active-enemy' : 'mode-btn';
      document.getElementById('m-ally').className = m === 'ally' ? 'mode-btn active-ally' : 'mode-btn';
    }

    function renderDraftGrid() {
      const container = document.getElementById('draft-grid');
      container.innerHTML = '';
      heroesData.forEach(h => {
        const card = document.createElement('div');
        card.className = 'grid-card';
        if (draftEnemies.includes(h.name)) card.classList.add('sel-enemy');
        if (draftAllies.includes(h.name)) card.classList.add('sel-ally');
        card.innerHTML = `<img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.code}.png">`;
        card.onclick = () => {
          if (draftMode === 'enemy') {
            draftEnemies.includes(h.name) ? draftEnemies = draftEnemies.filter(x => x !== h.name) : draftEnemies.push(h.name);
          } else {
            draftAllies.includes(h.name) ? draftAllies = draftAllies.filter(x => x !== h.name) : draftAllies.push(h.name);
          }
          renderDraftGrid();
        };
        container.appendChild(card);
      });
    }

    function calculateDraft() {
      if (draftEnemies.length === 0) { alert('Выберите хотя бы одного врага!'); return; }
      const resultsBox = document.getElementById('draft-results-box');
      const resultsList = document.getElementById('draft-results-list');
      resultsList.innerHTML = '';
      const carries = heroesData.filter(h => !draftEnemies.includes(h.name) && !draftAllies.includes(h.name));

      carries.slice(0, 5).forEach((c, idx) => {
        resultsList.innerHTML += `
          <div style="display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.3); padding:8px 10px; border-radius:8px;">
            <div style="display:flex; align-items:center; gap:8px;">
              <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${c.code}.png" style="width:36px; height:22px; border-radius:4px; object-fit:cover;">
              <span style="font-size:13px; font-weight:700;">${idx + 1}. ${c.name}</span>
            </div>
            <span style="color:#00e676; font-weight:700; font-size:12px;">+${(4.2 - idx * 0.6).toFixed(1)}%</span>
          </div>
        `;
      });
      resultsBox.style.display = 'block';
    }

    renderHeroesList();
