<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Drafter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
    }
    .selected-box {
      background: #1e1e1e;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      border: 1px solid #333;
      font-size: 13px;
    }
    .mode-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }
    .mode-btn.active-enemy {
      background: #8b0000;
      border-color: #ff4d4d;
    }
    .mode-btn.active-ally {
      background: #006400;
      border-color: #5cd65c;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .hero-card {
      background: #222;
      border: 2px solid #333;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      text-align: center;
    }
    .hero-card img {
      width: 100%;
      height: 40px;
      object-fit: cover;
      display: block;
    }
    .hero-card .hero-name {
      font-size: 9px;
      padding: 2px;
      background: rgba(0,0,0,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-card.selected-enemy {
      border-color: #ff4d4d;
      box-shadow: 0 0 5px #ff4d4d;
    }
    .hero-card.selected-ally {
      border-color: #5cd65c;
      box-shadow: 0 0 5px #5cd65c;
    }
    .btn-submit {
      width: 100%;
      padding: 10px;
      background: #f0ad4e;
      border: none;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
    }
    .results-box {
      margin-top: 12px;
      background: #1a1a1a;
      border: 1px solid #00bc8c;
      border-radius: 6px;
      padding: 10px;
      display: none;
    }
    .results-title {
      color: #00bc8c;
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 8px;
      text-align: center;
    }
    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #262626;
      padding: 5px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .result-item img {
      width: 30px;
      height: 20px;
      border-radius: 3px;
      margin-right: 6px;
    }
    .result-hero-info {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="selected-box">
    <div><strong>Враги:</strong> <span id="enemies-list" style="color:#ff4d4d;">Никого</span></div>
    <div><strong>Союзники:</strong> <span id="allies-list" style="color:#5cd65c;">Никого</span></div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active-enemy" id="mode-enemy" onclick="setMode('enemy')">Выбрать ВРАГА</button>
    <button class="mode-btn" id="mode-ally" onclick="setMode('ally')">Выбрать СОЮЗНИКА</button>
  </div>

  <div class="hero-grid" id="heroes-container"></div>

  <button class="btn-submit" onclick="calculatePicks()">Рассчитать идеальный пик</button>

  <div class="results-box" id="results-box">
    <div class="results-title">⚔️ ТОП КЕРРИ КОНТРПИКИ:</div>
    <div id="results-list"></div>
  </div>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const heroesList = [
      { name: "Axe", code: "axe", isCarry: false },
      { name: "Invoker", code: "invoker", isCarry: false },
      { name: "Sniper", code: "sniper", isCarry: true },
      { name: "Pudge", code: "pudge", isCarry: false },
      { name: "Juggernaut", code: "juggernaut", isCarry: true },
      { name: "Phantom Assassin", code: "phantom_assassination", isCarry: true },
      { name: "Slark", code: "slark", isCarry: true },
      { name: "Sven", code: "sven", isCarry: true },
      { name: "Anti-Mage", code: "antimage", isCarry: true },
      { name: "Faceless Void", code: "faceless_void", isCarry: true },
      { name: "Bristleback", code: "bristleback", isCarry: false },
      { name: "Drow Ranger", code: "drow_ranger", isCarry: true }
    ];

    const countersData = {
      "Juggernaut": { "Axe": 48.5, "Invoker": 54.2, "Pudge": 53.0, "Sniper": 51.5 },
      "Phantom Assassin": { "Axe": 45.0, "Invoker": 55.1, "Pudge": 52.4, "Sniper": 58.2 },
      "Slark": { "Axe": 46.2, "Invoker": 53.8, "Pudge": 56.1, "Sniper": 54.0 },
      "Sven": { "Axe": 51.0, "Invoker": 52.0, "Pudge": 54.5, "Sniper": 49.0 },
      "Anti-Mage": { "Axe": 44.0, "Invoker": 61.5, "Pudge": 51.0, "Sniper": 53.2 },
      "Faceless Void": { "Axe": 49.0, "Invoker": 52.5, "Pudge": 50.5, "Sniper": 55.0 },
      "Drow Ranger": { "Axe": 43.5, "Invoker": 50.1, "Pudge": 48.0, "Sniper": 47.0 },
      "Sniper": { "Axe": 52.0, "Invoker": 49.0, "Pudge": 47.5, "Sniper": 50.0 }
    };

    let selectedEnemies = [];
    let selectedAllies = [];
    let currentMode = 'enemy';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-enemy').className = mode === 'enemy' ? 'mode-btn active-enemy' : 'mode-btn';
      document.getElementById('mode-ally').className = mode === 'ally' ? 'mode-btn active-ally' : 'mode-btn';
    }

    function renderHeroes() {
      const container = document.getElementById('heroes-container');
      container.innerHTML = '';

      heroesList.forEach(hero => {
        const card = document.createElement('div');
        card.className = 'hero-card';

        if (selectedEnemies.includes(hero.name)) card.classList.add('selected-enemy');
        if (selectedAllies.includes(hero.name)) card.classList.add('selected-ally');

        const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png`;

        card.innerHTML = `
          <img src="${imgUrl}" alt="${hero.name}">
          <div class="hero-name">${hero.name}</div>
        `;

        card.onclick = () => toggleHero(hero.name);
        container.appendChild(card);
      });
    }

    function toggleHero(heroName) {
      if (currentMode === 'enemy') {
        if (selectedEnemies.includes(heroName)) {
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        } else if (selectedEnemies.length < 5) {
          selectedEnemies.push(heroName);
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        }
      } else {
        if (selectedAllies.includes(heroName)) {
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        } else if (selectedAllies.length < 4) {
          selectedAllies.push(heroName);
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        }
      }

      document.getElementById('enemies-list').innerText = selectedEnemies.join(', ') || 'Никого';
      document.getElementById('allies-list').innerText = selectedAllies.join(', ') || 'Никого';
      renderHeroes();
    }

    function calculatePicks() {
      if (selectedEnemies.length === 0) {
        alert('Выбери хотя бы одного врага!');
        return;
      }

      let scores = [];

      heroesList.filter(h => h.isCarry).forEach(carry => {
        if (selectedEnemies.includes(carry.name) || selectedAllies.includes(carry.name)) return;

        let totalWinrate = 0;
        let count = 0;

        selectedEnemies.forEach(enemy => {
          if (countersData[carry.name] && countersData[carry.name][enemy]) {
            totalWinrate += countersData[carry.name][enemy];
            count++;
          } else {
            totalWinrate += 50.0;
            count++;
          }
        });

        let avgWinrate = count > 0 ? (totalWinrate / count) : 50.0;
        let advantage = avgWinrate - 50.0;

        scores.push({
          hero: carry,
          advantage: advantage,
          winrate: avgWinrate
        });
      });

      scores.sort((a, b) => b.advantage - a.advantage);

      const resultsBox = document.getElementById('results-box');
      const resultsList = document.getElementById('results-list');
      resultsList.innerHTML = '';

      scores.slice(0, 5).forEach((item, index) => {
        const sign = item.advantage >= 0 ? '+' : '';
        const color = item.advantage >= 0 ? '#5cd65c' : '#ff4d4d';
        const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${item.hero.code}.png`;

        const row = document.createElement('div');
        row.className = 'result-item';
        row.innerHTML = `
          <div class="result-hero-info">
            <img src="${imgUrl}">
            <strong>${index + 1}. ${item.hero.name}</strong>
          </div>
          <span style="color: ${color}; font-weight: bold;">${sign}${item.advantage.toFixed(1)}%</span>
        `;
        resultsList.appendChild(row);
      });

      resultsBox.style.display = 'block';
    }

    renderHeroes();
  </script>
</body>
</html>
