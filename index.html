<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DotaMETA Pro Hub</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0b0813;
      background: linear-gradient(180deg, #160e29 0%, #08060f 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 12px;
      padding-bottom: 90px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header & Search */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .app-title {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .patch-tag {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.4);
      color: #c084fc;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 20px;
    }

    .search-container {
      position: relative;
      margin-bottom: 14px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }
    .search-input:focus {
      border-color: #a855f7;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.25);
    }
    .search-input::placeholder {
      color: #6b7280;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #6b7280;
    }

    /* Section Headers */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* List view */
    .heroes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hero-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 8px 12px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .hero-item:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.07);
    }
    .hero-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-avatar {
      width: 56px;
      height: 33px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hero-title {
      font-size: 14px;
      font-weight: 700;
      color: #f3f4f6;
    }
    .hero-role {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }
    .role-carry { color: #f59e0b; }
    .role-support { color: #10b981; }
    .role-mid { color: #ef4444; }
    .role-offlane { color: #3b82f6; }

    .winrate-badge {
      background: rgba(16, 185, 129, 0.12);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.25);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Draft Assistant */
    .draft-view {
      display: none;
    }
    .mode-switch {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #6b7280;
      font-weight: 700;
      font-size: 11px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .mode-btn.active-enemy {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }
    .mode-btn.active-ally {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }

    .grid-select {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .grid-card {
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .grid-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .grid-card.sel-enemy {
      border-color: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    }
    .grid-card.sel-ally {
      border-color: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
    }

    .btn-calc-draft {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      color: #ffffff;
      font-weight: 800;
      border-radius: 14px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 14px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }
    .btn-calc-draft:active {
      transform: scale(0.98);
    }

    .draft-results {
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px;
      display: none;
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 3, 12, 0.88);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 100;
    }
    .modal-content {
      width: 100%;
      max-height: 85vh;
      background: #120d21;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 18px;
      overflow-y: auto;
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .close-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
    }

    .info-block {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .info-title {
      font-size: 10px;
      color: #8b85a1;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* Items Row */
    .items-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .item-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px;
      border-radius: 8px;
      min-width: 80px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .item-card img {
      width: 44px;
      height: 32px;
      border-radius: 4px;
      margin-bottom: 4px;
      object-fit: cover;
    }
    .item-name {
      font-size: 9px;
      font-weight: 700;
      color: #e5e7eb;
      line-height: 1.1;
    }
    .item-time {
      font-size: 9px;
      color: #f59e0b;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Hero Counters Grid in Modal */
    .mini-heroes-grid {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .mini-hero-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      text-align: center;
    }
    .mini-hero-item img {
      width: 48px;
      height: 28px;
      border-radius: 6px;
      object-fit: cover;
      margin-bottom: 4px;
    }
    .mini-hero-item span {
      font-size: 9px;
      font-weight: 600;
      color: #d1d5db;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(18, 13, 33, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 4px;
      display: flex;
      justify-content: space-around;
      backdrop-filter: blur(16px);
      z-index: 90;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 10px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-btn.active {
      background: rgba(168, 85, 247, 0.15);
      color: #a855f7;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <div class="app-title">DotaMETA Pro</div>
    <div class="patch-tag">ПАТЧ 7.35+</div>
  </div>

  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Поиск героя или роли..." oninput="filterHeroes()">
  </div>

  <!-- TAB 1: HEROES -->
  <div id="tab-heroes">
    <div class="section-title">🔥 Метовые герои по рейтингу</div>
    <div class="heroes-list" id="heroes-list-container"></div>
  </div>

  <!-- TAB 2: DRAFT ASSISTANT -->
  <div id="tab-draft" class="draft-view">
    <div class="section-title">🪄 Калькулятор Пиков</div>
    <div class="mode-switch">
      <button class="mode-btn active-enemy" id="m-enemy" onclick="setDraftMode('enemy')">Выбрать ВРАГА</button>
      <button class="mode-btn" id="m-ally" onclick="setDraftMode('ally')">Выбрать СОЮЗНИКА</button>
    </div>
    
    <div class="grid-select" id="draft-grid"></div>

    <button class="btn-calc-draft" onclick="calculateDraft()">Рассчитать идеальный пик</button>

    <div class="draft-results" id="draft-results-box">
      <div class="info-title">⚔️ Лучшие решения под этот пик:</div>
      <div id="draft-results-list" style="display:flex; flex-direction:column; gap:6px;"></div>
    </div>
  </div>

  <!-- MODAL WINDOW -->
  <div class="modal-overlay" id="hero-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:10px;">
          <img id="m-img" style="width:56px; height:33px; border-radius:6px; object-fit:cover;">
          <div>
            <h2 id="m-title" style="font-size:16px;">Hero</h2>
            <span id="m-role" class="hero-role">ROLE</span>
          </div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="info-block">
        <div class="info-title">📊 Винрейт на High MM</div>
        <div id="m-winrate" style="font-size:18px; font-weight:800; color:#10b981;">50.0%</div>
      </div>

      <div class="info-block">
        <div class="info-title">🛍️ Сборка и тайминги предметов</div>
        <div class="items-list" id="m-items"></div>
      </div>

      <div class="info-block">
        <div class="info-title">🛡️ Синергия (Отличные связки)</div>
        <div class="mini-heroes-grid" id="m-allies"></div>
      </div>

      <div class="info-block">
        <div class="info-title">⚔️ Главные контрпики</div>
        <div class="mini-heroes-grid" id="m-counters"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="btn-tab-heroes" onclick="switchTab('heroes')">
      <span style="font-size:16px;">👥</span>ГЕРОИ
    </button>
    <button class="nav-btn" id="btn-tab-draft" onclick="switchTab('draft')">
      <span style="font-size:16px;">🪄</span>ДРАФТ
    </button>
  </div>

    let draftEnemies = [];
    let draftAllies = [];
    let draftMode = 'enemy';

    function getHeroNameByCode(code) {
      const hero = heroesData.find(h => h.code === code);
      return hero ? hero.name : code;
    }

    function renderHeroesList(list = heroesData) {
      const container = document.getElementById('heroes-list-container');
      container.innerHTML = '';
      list.forEach(h => {
        const item = document.createElement('div');
        item.className = 'hero-item';
        item.innerHTML = `
          <div class="hero-left">
            <img class="hero-avatar" src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.code}.png">
            <div class="hero-meta">
              <span class="hero-title">${h.name}</span>
              <span class="hero-role ${h.roleClass}">➶ ${h.role}</span>
            </div>
          </div>
          <div class="winrate-badge">${h.winrate}</div>
        `;
        item.onclick = () => openModal(h);
        container.appendChild(item);
      });
    }

    function openModal(hero) {
      document.getElementById('m-title').innerText = hero.name;
      document.getElementById('m-role').innerText = hero.role;
      document.getElementById('m-role').className = `hero-role ${hero.roleClass}`;
      document.getElementById('m-winrate').innerText = hero.winrate;
      document.getElementById('m-img').src = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png`;

      const itemsContainer = document.getElementById('m-items');
      itemsContainer.innerHTML = '';
      hero.items.forEach(it => {
        itemsContainer.innerHTML += `
          <div class="item-card">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/${it.img}.png">
            <span class="item-name">${it.name}</span>
            <span class="item-time">⏱️ ${it.time}</span>
          </div>
        `;
      });

      const alliesContainer = document.getElementById('m-allies');
      alliesContainer.innerHTML = '';
      hero.alliesCodes.forEach(code => {
        alliesContainer.innerHTML += `
          <div class="mini-hero-item">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${code}.png">
            <span>${getHeroNameByCode(code)}</span>
          </div>
        `;
      });

      const countersContainer = document.getElementById('m-counters');
      countersContainer.innerHTML = '';
      hero.counterCodes.forEach(code => {
        countersContainer.innerHTML += `
          <div class="mini-hero-item">
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${code}.png">
            <span>${getHeroNameByCode(code)}</span>
          </div>
        `;
      });

      document.getElementById('hero-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('hero-modal').style.display = 'none';
    }

    function filterHeroes() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = heroesData.filter(h => 
        h.name.toLowerCase().includes(q) || h.role.toLowerCase().includes(q)
      );
      renderHeroesList(filtered);
    }

    function switchTab(tab) {
      document.getElementById('tab-heroes').style.display = tab === 'heroes' ? 'block' : 'none';
      document.getElementById('tab-draft').style.display = tab === 'draft' ? 'block' : 'none';
      document.getElementById('btn-tab-heroes').className = tab === 'heroes' ? 'nav-btn active' : 'nav-btn';
      document.getElementById('btn-tab-draft').className = tab === 'draft' ? 'nav-btn active' : 'nav-btn';

      if (tab === 'draft') renderDraftGrid();
    }

    function setDraftMode(m) {
      draftMode = m;
      document.getElementById('m-enemy').className = m === 'enemy' ? 'mode-btn active-enemy' : 'mode-btn';
      document.getElementById('m-ally').className = m === 'ally' ? 'mode-btn active-ally' : 'mode-btn';
    }

    function renderDraftGrid() {
      const container = document.getElementById('draft-grid');
      container.innerHTML = '';
      heroesData.forEach(h => {
        const card = document.createElement('div');
        card.className = 'grid-card';
        if (draftEnemies.includes(h.name)) card.classList.add('sel-enemy');
        if (draftAllies.includes(h.name)) card.classList.add('sel-ally');

        card.innerHTML = `<img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.code}.png">`;
        card.onclick = () => {
          if (draftMode === 'enemy') {
            draftEnemies.includes(h.name) ? draftEnemies = draftEnemies.filter(x => x !== h.name) : draftEnemies.push(h.name);
          } else {
            draftAllies.includes(h.name) ? draftAllies = draftAllies.filter(x => x !== h.name) : draftAllies.push(h.name);
          }
          renderDraftGrid();
        };
        container.appendChild(card);
      });
    }

    function calculateDraft() {
      if (draftEnemies.length === 0) {
        alert('Выберите хотя бы одного врага!');
        return;
      }

      const resultsBox = document.getElementById('draft-results-box');
      const resultsList = document.getElementById('draft-results-list');
      resultsList.innerHTML = '';

      const carries = heroesData.filter(h => !draftEnemies.includes(h.name) && !draftAllies.includes(h.name));

      carries.slice(0, 5).forEach((c, idx) => {
        resultsList.innerHTML += `
          <div style="display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.3); padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
            <div style="display:flex; align-items:center; gap:10px;">
              <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${c.code}.png" style="width:40px; height:24px; border-radius:4px; object-fit:cover;">
              <span style="font-size:13px; font-weight:700;">${idx + 1}. ${c.name}</span>
            </div>
            <span style="color:#10b981; font-weight:700; font-size:12px;">+${(4.5 - idx * 0.7).toFixed(1)}% Winrate</span>
          </div>
        `;
      });

      resultsBox.style.display = 'block';
    }

    renderHeroesList();
  </script>
</body>
</html>
