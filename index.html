<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Drafter</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #0f1115;
      color: #e1e6eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 12px;
    }

    /* Верхний блок выбранных героев */
    .draft-header {
      background: #161920;
      border: 1px solid #282c37;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .team-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 75px;
    }
    .team-title.enemy { color: #ff5252; }
    .team-title.ally { color: #4caf50; }
    
    .slots-container {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .slot {
      width: 36px;
      height: 24px;
      background: #202430;
      border: 1px dashed #3a4050;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Переключатель режимов */
    .mode-switch {
      display: flex;
      background: #161920;
      padding: 3px;
      border-radius: 8px;
      border: 1px solid #282c37;
      margin-bottom: 12px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: #7a8294;
      font-weight: 600;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .mode-btn.active-enemy {
      background: #2a1215;
      color: #ff5252;
      border: 1px solid #ff525244;
    }
    .mode-btn.active-ally {
      background: #122817;
      color: #4caf50;
      border: 1px solid #4caf5044;
    }

    /* Сетка героев */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .hero-grid::-webkit-scrollbar {
      width: 4px;
    }
    .hero-grid::-webkit-scrollbar-thumb {
      background: #282c37;
      border-radius: 4px;
    }

    .hero-card {
      position: relative;
      background: #161920;
      border: 2px solid #282c37;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.2s;
      aspect-ratio: 16/9;
    }
    .hero-card:active {
      transform: scale(0.96);
    }
    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-card .hero-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 4px;
      background: rgba(0, 0, 0, 0.75);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-card.selected-enemy {
      border-color: #ff5252;
      box-shadow: 0 0 8px rgba(255, 82, 82, 0.4);
    }
    .hero-card.selected-ally {
      border-color: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
    }

    /* Кнопка расчета */
    .btn-calc {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #e5a93c, #c88318);
      border: none;
      color: #0f1115;
      font-weight: 700;
      border-radius: 8px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 12px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(200, 131, 24, 0.25);
    }

    /* Блок результатов */
    .results-box {
      margin-top: 14px;
      background: #161920;
      border: 1px solid #282c37;
      border-radius: 8px;
      padding: 10px;
      display: none;
    }
    .results-title {
      color: #e5a93c;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      text-align: center;
    }
    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #202430;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .result-item:last-child {
      margin-bottom: 0;
    }
    .hero-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-info img {
      width: 32px;
      height: 20px;
      border-radius: 3px;
      object-fit: cover;
    }
    .hero-info span {
      font-size: 12px;
      font-weight: 600;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .badge.positive {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
    }
    .badge.negative {
      background: rgba(255, 82, 82, 0.15);
      color: #ff5252;
    }
  </style>
</head>
<body>

  <!-- Блок выбранных слотов -->
  <div class="draft-header">
    <div class="team-row">
      <span class="team-title enemy">Враги</span>
      <div class="slots-container" id="enemy-slots">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
      </div>
    </div>
    <div class="team-row">
      <span class="team-title ally">Союзники</span>
      <div class="slots-container" id="ally-slots">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
      </div>
    </div>
  </div>

  <!-- Переключатель -->
  <div class="mode-switch">
    <button class="mode-btn active-enemy" id="mode-enemy" onclick="setMode('enemy')">Выбрать ВРАГА</button>
    <button class="mode-btn" id="mode-ally" onclick="setMode('ally')">Выбрать СОЮЗНИКА</button>
  </div>

  <!-- Сетка героев -->
  <div class="hero-grid" id="heroes-container"></div>

  <!-- Кнопка -->
  <button class="btn-calc" onclick="calculatePicks()">Рассчитать контрпики</button>

  <!-- Результаты -->
  <div class="results-box" id="results-box">
    <div class="results-title">⚔️ Лучшие Керри против пика</div>
    <div id="results-list"></div>
  </div>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Список героев (код фантомки исправлен на phantom_assassin)
    const heroesList = [
      { name: "Axe", code: "axe", isCarry: false },
      { name: "Invoker", code: "invoker", isCarry: false },
      { name: "Sniper", code: "sniper", isCarry: true },
      { name: "Pudge", code: "pudge", isCarry: false },
      { name: "Juggernaut", code: "juggernaut", isCarry: true },
      { name: "Phantom Assassin", code: "phantom_assassin", isCarry: true },
      { name: "Slark", code: "slark", isCarry: true },
      { name: "Sven", code: "sven", isCarry: true },
      { name: "Anti-Mage", code: "antimage", isCarry: true },
      { name: "Faceless Void", code: "faceless_void", isCarry: true },
      { name: "Bristleback", code: "bristleback", isCarry: false },
      { name: "Drow Ranger", code: "drow_ranger", isCarry: true }
    ];

    const countersData = {
      "Juggernaut": { "Axe": 48.5, "Invoker": 54.2, "Pudge": 53.0, "Sniper": 51.5 },
      "Phantom Assassin": { "Axe": 45.0, "Invoker": 55.1, "Pudge": 52.4, "Sniper": 58.2 },
      "Slark": { "Axe": 46.2, "Invoker": 53.8, "Pudge": 56.1, "Sniper": 54.0 },
      "Sven": { "Axe": 51.0, "Invoker": 52.0, "Pudge": 54.5, "Sniper": 49.0 },
      "Anti-Mage": { "Axe": 44.0, "Invoker": 61.5, "Pudge": 51.0, "Sniper": 53.2 },
      "Faceless Void": { "Axe": 49.0, "Invoker": 52.5, "Pudge": 50.5, "Sniper": 55.0 },
      "Drow Ranger": { "Axe": 43.5, "Invoker": 50.1, "Pudge": 48.0, "Sniper": 47.0 },
      "Sniper": { "Axe": 52.0, "Invoker": 49.0, "Pudge": 47.5, "Sniper": 50.0 }
    };

    let selectedEnemies = [];
    let selectedAllies = [];
    let currentMode = 'enemy';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-enemy').className = mode === 'enemy' ? 'mode-btn active-enemy' : 'mode-btn';
      document.getElementById('mode-ally').className = mode === 'ally' ? 'mode-btn active-ally' : 'mode-btn';
    }

    function updateSlots() {
      const enemySlots = document.querySelectorAll('#enemy-slots .slot');
      enemySlots.forEach((slot, i) => {
        if (selectedEnemies[i]) {
          const hero = heroesList.find(h => h.name === selectedEnemies[i]);
          slot.innerHTML = `<img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png">`;
        } else {
          slot.innerHTML = '';
        }
      });

      const allySlots = document.querySelectorAll('#ally-slots .slot');
      allySlots.forEach((slot, i) => {
        if (selectedAllies[i]) {
          const hero = heroesList.find(h => h.name === selectedAllies[i]);
          slot.innerHTML = `<img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png">`;
        } else {
          slot.innerHTML = '';
        }
      });
    }

    function renderHeroes() {
      const container = document.getElementById('heroes-container');
      container.innerHTML = '';

      heroesList.forEach(hero => {
        const card = document.createElement('div');
        card.className = 'hero-card';

        if (selectedEnemies.includes(hero.name)) card.classList.add('selected-enemy');
        if (selectedAllies.includes(hero.name)) card.classList.add('selected-ally');

        const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${hero.code}.png`;

        card.innerHTML = `
          <img src="${imgUrl}" alt="${hero.name}">
          <div class="hero-name">${hero.name}</div>
        `;

        card.onclick = () => toggleHero(hero.name);
        container.appendChild(card);
      });

      updateSlots();
    }

    function toggleHero(heroName) {
      if (currentMode === 'enemy') {
        if (selectedEnemies.includes(heroName)) {
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        } else if (selectedEnemies.length < 5) {
          selectedEnemies.push(heroName);
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        }
      } else {
        if (selectedAllies.includes(heroName)) {
          selectedAllies = selectedAllies.filter(h => h !== heroName);
        } else if (selectedAllies.length < 4) {
          selectedAllies.push(heroName);
          selectedEnemies = selectedEnemies.filter(h => h !== heroName);
        }
      }

      renderHeroes();
    }

    function calculatePicks() {
      if (selectedEnemies.length === 0) {
        alert('Выберите хотя бы одного вражеского героя!');
        return;
      }

      let scores = [];

      heroesList.filter(h => h.isCarry).forEach(carry => {
        if (selectedEnemies.includes(carry.name) || selectedAllies.includes(carry.name)) return;

        let totalWinrate = 0;
        let count = 0;

        selectedEnemies.forEach(enemy => {
          if (countersData[carry.name] && countersData[carry.name][enemy]) {
            totalWinrate += countersData[carry.name][enemy];
            count++;
          } else {
            totalWinrate += 50.0;
            count++;
          }
        });

        let avgWinrate = count > 0 ? (totalWinrate / count) : 50.0;
        let advantage = avgWinrate - 50.0;

        scores.push({
          hero: carry,
          advantage: advantage
        });
      });

      scores.sort((a, b) => b.advantage - a.advantage);

      const resultsBox = document.getElementById('results-box');
      const resultsList = document.getElementById('results-list');
      resultsList.innerHTML = '';

      scores.slice(0, 5).forEach((item, index) => {
        const sign = item.advantage >= 0 ? '+' : '';
        const badgeClass = item.advantage >= 0 ? 'positive' : 'negative';
        const imgUrl = `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${item.hero.code}.png`;

        const row = document.createElement('div');
        row.className = 'result-item';
        row.innerHTML = `
          <div class="hero-info">
            <img src="${imgUrl}">
            <span>${index + 1}. ${item.hero.name}</span>
          </div>
          <span class="badge ${badgeClass}">${sign}${item.advantage.toFixed(1)}%</span>
        `;
        resultsList.appendChild(row);
      });

      resultsBox.style.display = 'block';
    }

    renderHeroes();
  </script>
</body>
</html>
